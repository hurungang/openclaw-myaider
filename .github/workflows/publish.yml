name: Publish to ClawHub and npm

on:
  push:
    branches:
      - main

jobs:
  test-and-publish:
    name: Test and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: myaider

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and tag
        id: version
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync openclaw.plugin.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('openclaw.plugin.json', 'utf8'));
            manifest.version = '${VERSION}'.replace(/^v/, '');
            fs.writeFileSync('openclaw.plugin.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Commit version bump
        run: |
          git add package.json openclaw.plugin.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "${{ steps.version.outputs.version }}"
          git push origin HEAD:main --follow-tags

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Publish to ClawHub
        run: |
          clawhub login --token "$CLAWHUB_SECRET" --no-browser
          clawhub package publish . --source-repo "$GITHUB_REPOSITORY" --source-commit "$GITHUB_SHA" --source-ref "$GITHUB_REF"
        env:
          CLAWHUB_SECRET: ${{ secrets.CLAWHUB_SECRET }}

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "@myaider/myaider@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "Version ${PACKAGE_VERSION} is already published to npm, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
